<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Life Story | 3D Storytelling Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

</head>

<body>
    <div id="app">
        <canvas class="webgl"></canvas>

        <!-- UI Overlay -->
        <div class="overlay">
            <!-- HUD: Đồng hồ & Mùa -->
            <div class="hud-top-left">
                <div class="hud-time-badge">
                    <span class="hud-clock-icon">🕐</span>
                    <span id="time-label" class="hud-time-text">05:30 AM</span>
                </div>
                <div class="hud-season-badge">
                    <span class="hud-season-icon">🌿</span>
                    <span id="season-label" class="hud-season-text">Mùa Xuân</span>
                </div>
            </div>

            <div class="story-content">
                <header>
                    <span class="subtitle">---</span>
                    <h1 class="title">---</h1>
                </header>
                <div class="description-container">
                    <p class="description">---</p>
                </div>
                <!-- <div class="navigation-hint">
                    Scroll to explore
                    <div class="mouse-icon"></div>
                </div> -->
            </div>

            <nav class="side-nav">
                <!-- Will be populated by JS -->
            </nav>

            <div class="music-control">
                <button id="music-toggle" title="Play Music">
                    <div class="music-icon-bars">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </button>
                <div id="youtube-player" style="display: none;"></div>
            </div>

            <!-- Cartoon Info Card -->
            <div id="car-card" class="cartoon-card">
                <div class="card-close">&times;</div>
                <div class="card-header">
                    <div class="card-avatar">🐐</div>
                    <div class="card-title-group">
                        <h3>Huyền Dê</h3>
                        <span>Thợ Săn Deadline</span>
                    </div>
                </div>
                <div class="card-body">
                    <p>"Đang trên đường đi tìm cảm hứng... hoặc chỉ là đang lạc đường trong sa mạc này thôi!"</p>
                    <div class="card-stats">
                        <div class="stat"><span>HP</span>
                            <div class="bar">
                                <div class="fill" style="width: 80%"></div>
                            </div>
                        </div>
                        <div class="stat"><span>ENERGY</span>
                            <div class="bar">
                                <div class="fill" style="width: 40%"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    🚀 <span>Level 99 Creative</span>
                </div>
            </div>

            <!-- Vehicle Control Menu -->
            <div id="vehicle-menu" class="vehicle-menu">
                <div class="menu-close">&times;</div>
                <h2 class="menu-title">TÙY CHỈNH PHƯƠNG TIỆN</h2>
                
                <div class="menu-section">
                    <h3>CHỌN LOẠI</h3>
                    <div class="vehicle-options">
                        <button class="v-opt active" data-type="car">🚗 Ô tô</button>
                        <button class="v-opt" data-type="bike">🏍️ Mô tô</button>
                        <button class="v-opt" data-type="plane">✈️ Máy bay</button>
                        <button class="v-opt" data-type="runner">🏃 Người chạy</button>
                        <button class="v-opt" data-type="chicken">🐔 Con gà</button>
                    </div>
                </div>

                <div class="menu-section">
                    <h3>CHẾ ĐỘ LÁI</h3>
                    <div class="control-row">
                        <span>Tự động chạy</span>
                        <label class="switch">
                            <input type="checkbox" id="auto-drive-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    <div class="control-row speed-row">
                        <span>Tốc độ</span>
                        <input type="range" id="auto-speed-slider" min="0.1" max="10" step="0.1" value="1">
                        <span id="speed-value">1.0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="loading-screen">
            <div class="loader"></div>
            <p>Loading Experience...</p>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
